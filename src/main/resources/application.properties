spring.application.name=Citas

# ─── Supabase / PostgreSQL (Connection Pooler) ───────────────
# Usamos el pooler (aws-1...) con el puerto 5432 y exigimos SSL
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require

# ATENCIÓN AQUÍ: El usuario debe ser postgres.[ID-DEL-PROYECTO]
spring.datasource.username=postgres.hynuxxkgxzjjcpkowfhz
spring.datasource.password=Lazoenlacima
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── Pool de Conexiones (Excelente práctica que trajiste de Phantom) ─
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ─────────────────────────────────────────
# Usamos validate para que respete las tablas de tu archivo hospital_db.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Servidor ────────────────────────────────────────────────
server.port=8087